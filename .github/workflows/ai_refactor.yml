name: AI Refactor Bot

on:
  issues:
    types: [labeled] # 当你给 Issue 贴标签时触发

jobs:
  aider_refactor:
    if: github.event.label.name == 'refactor' # 只有标签名为 'refactor' 时才运行
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Aider 需要完整的 git 历史来分析代码

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Aider
        run: pip install aider-chat

      - name: Run Aider
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 配置 git 机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 执行 Aider。它会读取 Issue 的标题和内容作为指令
          # --yes: 自动确认 AI 的修改建议
          # --message: 具体的指令内容
          aider --model deepseek/deepseek-chat --yes --message "Instruction: ${{ github.event.issue.title }}. Context: ${{ github.event.issue.body }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: ai-refactor-${{ github.event.issue.number }}
          title: "AI Refactor: ${{ github.event.issue.title }}"
          body: "This PR was automatically generated by Aider based on Issue #${{ github.event.issue.number }}."