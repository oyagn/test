name: AI Refactor Bot (Fixed Windows)

on:
  issues:
    types: [labeled]

jobs:
  aider_refactor:
    if: github.event.label.name == 'refactor'
    runs-on: self-hosted 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Aider
        id: aider_run
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        # 将 shell 改为 powershell (系统自带版)
        shell: powershell
        run: |
          # 配置 Git 身份
          git config user.name "AI-Refactor-Bot"
          git config user.email "bot@example.com"
          
          # 【关键修改】请将下方的路径替换为你刚才用 'where aider' 查到的真实路径
          $AIDER_PATH = "D:\pro_software\anaconda\file\envs\aider-env\Scripts\aider.exe"
          
          # 运行 Aider
          & $AIDER_PATH --model deepseek/deepseek-chat --yes --message "Instruction: ${{ github.event.issue.title }}. Context: ${{ github.event.issue.body }}"

      - name: Verify and Force Commit
        if: always()
        shell: powershell
        run: |
          echo "=== 当前目录文件列表 ==="
          dir
          
          $status = git status --porcelain
          if ($status) {
              echo "检测到代码改动，正在强制提交..."
              git add .
              git commit -m "AI: 自动生成代码 - ${{ github.event.issue.title }}"
          } else {
              echo "Aider 没有产生任何文件修改。"
          }

      - name: Create Pull Request
        if: always()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-refactor-local-${{ github.event.issue.number }}
          title: "AI Refactor: ${{ github.event.issue.title }}"
          body: "此 PR 由本地 Runner 自动生成。请检查代码逻辑。"
