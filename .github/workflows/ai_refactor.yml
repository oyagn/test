name: AI Refactor Bot (Local Runner)

on:
  issues:
    types: [labeled]

jobs:
  aider_refactor:
    if: github.event.label.name == 'refactor'
    # 关键修改：指定在你刚才配置好的 Windows 本地 Runner 上运行
    runs-on: self-hosted 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Aider 需要完整的 Git 历史

      - name: Show Current Workspace (Debug)
        run: |
          echo "当前项目路径: $(Get-Location)"
          echo "当前分支: $(git branch --show-current)"
        shell: pwsh

      - name: Run Aider
        id: aider_run
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        shell: pwsh
        run: |
          # 1. 确保 Git 用户信息已配置（本地环境有时需要显式指定）
          git config user.name "AI-Refactor-Bot"
          git config user.email "bot@example.com"
          
          # 2. 运行 Aider (去掉了日志重定向，这样你能在网页控制台直接看到实时输出)
          # 注意：在 Windows 下，建议显式调用 python -m aider（取决于你如何安装的）
          # 或者直接使用 aider。如果报错找不到命令，请确保 Aider 路径在系统环境变量中。
          aider --model deepseek/deepseek-chat --yes --message "Instruction: ${{ github.event.issue.title }}. Context: ${{ github.event.issue.body }}"

      - name: Verify Changes (Debug)
        if: always()
        shell: pwsh
        run: |
          echo "=== 检查工作区状态 ==="
          git status
          echo "=== 检查是否有新文件生成 ==="
          dir # 在 Windows 上列出文件，确认 PPO_train.py 等是否存在
        
      - name: Manual Commit Recovery
        if: always()
        shell: pwsh
        run: |
          # 这是一个兜底步骤：如果 Aider 修改了文件但因为某种原因没自动 commit，我们在这里强制 commit
          $status = git status --porcelain
          if ($status) {
              echo "检测到未提交的改动，正在执行强制提交..."
              git add .
              git commit -m "AI: 自动重构代码 - ${{ github.event.issue.title }}"
          } else {
              echo "没有检测到任何文件变动。"
          }

      - name: Create Pull Request
        if: always()
        uses: peter-evans/create-pull-request@v5
        with:
          # 注意：由于是在本地运行，请确保你的 Runner 有权限推送到 GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-refactor-local-${{ github.event.issue.number }}
          title: "AI Refactor: ${{ github.event.issue.title }}"
          body: "此 PR 由本地 Runner 上的 Aider 智能体自动生成。"
