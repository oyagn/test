name: AI Refactor Bot with Reporting

on:
  issues:
    types: [labeled]

jobs:
  aider_refactor:
    if: github.event.label.name == 'refactor'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Aider
        run: pip install aider-chat

      - name: Run Aider
        id: aider_run
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        # continue-on-error 确保即便 Aider 报错，后面的留言步骤也会运行
        continue-on-error: true 
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. 移除 > aider_output.log，让日志直接打印在控制台
          # 2. 显式指定使用的模型格式（有时 deepseek/deepseek-chat 在 Aider 中需要这样写）
          aider --model deepseek/deepseek-chat --yes --message "Instruction: ${{ github.event.issue.title }}. Context: ${{ github.event.issue.body }}"
         
      - name: Create Pull Request
        if: steps.aider_run.outcome == 'success'
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          branch: ai-refactor-${{ github.event.issue.number }}
          title: "AI Refactor: ${{ github.event.issue.title }}"
          body: "This PR was automatically generated by Aider based on Issue #${{ github.event.issue.number }}."
        continue-on-error: true

      - name: Prepare Report
        if: always() # 无论成功失败都执行
        id: report
        run: |
          if [ "${{ steps.aider_run.outcome }}" == "success" ]; then
            echo "STATUS=✅ **成功**" >> $GITHUB_OUTPUT
            echo "MSG<<EOF" >> $GITHUB_OUTPUT
            echo "我已经完成了代码重构！具体工作如下：" >> $GITHUB_OUTPUT
            # 获取最近的 commit 记录作为工作简报
            git log -n 5 --pretty=format:"- %s" >> $GITHUB_OUTPUT
            echo -e "\n\n您可以点击下方链接查看并合并代码：" >> $GITHUB_OUTPUT
            echo "${{ steps.cpr.outputs.pull-request-url }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "STATUS=❌ **失败**" >> $GITHUB_OUTPUT
            echo "MSG<<EOF" >> $GITHUB_OUTPUT
            echo "在尝试自动重构时遇到了障碍。以下是错误日志摘要：" >> $GITHUB_OUTPUT
            echo "\`\`\`" >> $GITHUB_OUTPUT
            tail -n 15 aider_output.log >> $GITHUB_OUTPUT
            echo "\`\`\`" >> $GITHUB_OUTPUT
            echo "请检查 Actions 运行详情以获取完整日志。" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Post Comment on Issue
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## 🤖 AI 重构任务报告
            **当前状态：** ${{ steps.report.outputs.STATUS }}
            
            ${{ steps.report.outputs.MSG }}
            
            ---
            *本回复由 AI-Agent 自动生成。*
